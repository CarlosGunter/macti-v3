repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff (lint)
        entry: uv --directory backend run ruff check --fix --config pyproject.toml .
        language: system
        pass_filenames: false
        files: ^backend/

      - id: ruff-format
        name: Ruff (format)
        entry: uv --directory backend run ruff format --config pyproject.toml .
        language: system
        pass_filenames: false
        files: ^backend/

  # --- Pyright (type checking) ---
  - repo: local
    hooks:
      - id: pyright
        name: Pyright (type checking)
        entry: uvx --directory backend pyright --venvpath .
        language: system
        pass_filenames: false
        files: ^backend/