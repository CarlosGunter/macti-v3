name: API CI/CD

on:
  push:
    branches: [ dev ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [ dev ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_run:
    workflows: ["Branch Gatekeeper"]
    types:
      - completed
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend
  PYTHON_VERSION: "3.12"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  initialize:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determinar si debe ejecutarse
        id: check
        run: |
          SHOULD_RUN="true"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Gatekeeper no fue exitoso. Saltando ejecución."
              SHOULD_RUN="false"
            else
              echo "Analizando cambios en el commit ${{ github.event.workflow_run.head_sha }}..."
              FILES_CHANGED=$(git diff-tree --no-commit-id --name-only -r ${{ github.event.workflow_run.head_sha }} || true)
              echo "Archivos modificados:"
              echo "$FILES_CHANGED"
              if ! echo "$FILES_CHANGED" | grep -qE '^(backend/|\.github/workflows/backend-ci-cd.yml)'; then
                echo "No hay cambios en backend. Saltando."
                SHOULD_RUN="false"
              fi
            fi
          fi
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

  quality:
    needs: initialize
    if: needs.initialize.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # - name: Configurar uv
      #   uses: astral-sh/setup-uv@v7

      # - name: Configurar Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ env.PYTHON_VERSION }}

      # - name: Instalar dependencias de desarrollo
      #   run: uv sync --locked --group dev
      #   working-directory: backend

      # - name: Validar Ruff (Linter)
      #   run: uv run ruff check .
      #   working-directory: backend

      # - name: Validar formato con Ruff
      #   run: uv run ruff format --check .
      #   working-directory: backend

      # - name: Validar tipos con Pyright
      #   run: uvx pyright --venvpath .
      #   working-directory: backend

  build-and-push:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Construir la imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
