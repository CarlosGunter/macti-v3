name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_run:
    workflows: ["Branch Gatekeeper"]
    types:
      - completed
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend
  NODE_VERSION: "24"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  initialize:
    name: Inicializar Pipeline de Frontend
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determinar si debe ejecutarse
        id: check
        run: |
          SHOULD_RUN="false"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Gatekeeper no fue exitoso. Saltando ejecución."
              SHOULD_RUN="false"
            else
              echo "Analizando cambios en el commit ${{ github.event.workflow_run.head_sha }}..."
              FILES_CHANGED=$(git diff-tree --no-commit-id --name-only -r -m ${{ github.event.workflow_run.head_sha }} || true)
              echo "Archivos modificados:"
              echo "$FILES_CHANGED"
              if echo "$FILES_CHANGED" | grep -qE '^(frontend/|\.github/workflows/frontend-ci-cd.yml)'; then
                SHOULD_RUN="true"
              fi
            fi
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Analizando cambios para Pull Request..."
            git fetch origin ${{ github.base_ref }} --depth=1
            FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD || true)
            echo "Archivos modificados:"
            echo "$FILES_CHANGED"
            if echo "$FILES_CHANGED" | grep -qE '^(frontend/|\.github/workflows/frontend-ci-cd.yml)'; then
              SHOULD_RUN="true"
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "Analizando cambios para Push..."
            FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD || true)
            echo "Archivos modificados:"
            echo "$FILES_CHANGED"
            if echo "$FILES_CHANGED" | grep -qE '^(frontend/|\.github/workflows/frontend-ci-cd.yml)'; then
              SHOULD_RUN="true"
            fi
          else
            echo "Otro tipo de evento (workflow_dispatch/etc). Ejecutando por defecto."
            SHOULD_RUN="true"
          fi
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

  quality:
    name: Control de Calidad de Frontend
    needs: initialize
    if: needs.initialize.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Validar Biome (Linter y Formateador)
        run: pnpm exec biome ci ./src
        working-directory: frontend

  build-and-push:
    name: Construcción y Publicación de Frontend
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
